<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>내 주변 T멤버십</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --navy:#12163a; --navy2:#1c2154; --navy3:#262c66;
    --amber:#ffb020; --amber-d:#e8960a;
    --bg:#f4f5fa; --card:#ffffff;
    --tx:#181a2e; --tx2:#5b5f82; --tx3:#9295b3;
    --bd:#e6e7f2;
    --c-movie:#7c5cff; --c-bakery:#ff8a5c; --c-fam:#ff5c8a;
    --c-pizza:#ff5c5c; --c-dessert:#22b8cf; --c-cvs:#22c55e;
    --sh:0 2px 10px rgba(18,22,58,.08), 0 8px 28px rgba(18,22,58,.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);color:var(--tx);overscroll-behavior:none;}
  #app{position:relative;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

  /* ---- Setup screen ---- */
  #setup{position:fixed;inset:0;background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 60%,var(--navy3) 100%);color:#fff;z-index:50;display:flex;flex-direction:column;justify-content:center;padding:28px;}
  #setup.hidden{display:none;}
  .setup-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--amber);background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.3);padding:5px 10px;border-radius:20px;width:fit-content;margin-bottom:16px;}
  #setup h1{font-size:23px;font-weight:800;line-height:1.4;margin:0 0 10px;letter-spacing:-.01em;}
  #setup p{font-size:13.5px;color:rgba(255,255,255,.65);line-height:1.65;margin:0 0 22px;}
  #setup ol{font-size:13px;color:rgba(255,255,255,.8);line-height:1.9;padding-left:18px;margin:0 0 22px;}
  #setup a{color:var(--amber);text-decoration:none;font-weight:600;}
  .key-input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;font-size:14px;margin-bottom:10px;outline:none;}
  .key-input::placeholder{color:rgba(255,255,255,.35);}
  .key-input:focus{border-color:var(--amber);}
  .btn-primary{width:100%;padding:15px;border-radius:12px;border:none;background:var(--amber);color:var(--navy);font-weight:800;font-size:15px;cursor:pointer;letter-spacing:-.01em;}
  .btn-primary:active{background:var(--amber-d);}
  .btn-primary:disabled{opacity:.4;}
  #setup-err{font-size:12.5px;color:#ff8a8a;margin-top:8px;min-height:16px;}

  /* ---- Top bar ---- */
  #topbar{background:var(--navy);color:#fff;padding:14px 16px 12px;flex-shrink:0;z-index:20;box-shadow:var(--sh);}
  #topbar .row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  #topbar h1{font-size:16px;font-weight:800;margin:0;letter-spacing:-.01em;display:flex;align-items:center;gap:6px;}
  #topbar h1 .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);}
  #reset-key{background:none;border:none;color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;padding:4px;}
  .search-wrap{position:relative;}
  #search-input{width:100%;padding:11px 40px 11px 14px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:14px;outline:none;}
  #search-input::placeholder{color:rgba(255,255,255,.4);}
  #search-input:focus{background:rgba(255,255,255,.16);}
  .search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5;}
  #suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border-radius:12px;box-shadow:var(--sh);overflow:hidden;z-index:30;max-height:280px;overflow-y:auto;}
  #suggest.hidden{display:none;}
  .sug-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;color:var(--tx);border-bottom:1px solid var(--bg);}
  .sug-item:last-child{border-bottom:none;}
  .sug-item:active{background:var(--bg);}
  .sug-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .sug-name{font-size:13.5px;font-weight:700;}
  .sug-cat{font-size:11px;color:var(--tx3);}

  /* ---- Filter chips ---- */
  #chips{display:flex;gap:7px;overflow-x:auto;padding:10px 14px;background:var(--card);flex-shrink:0;border-bottom:1px solid var(--bd);scrollbar-width:none;}
  #chips::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;padding:7px 13px;border-radius:20px;border:1.5px solid var(--bd);background:#fff;font-size:12.5px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:.15s;}
  .chip.on{background:var(--tx);border-color:var(--tx);color:#fff;}
  .chip .n{opacity:.5;font-weight:500;margin-left:2px;}

  /* ---- Map ---- */
  #map-wrap{position:relative;flex:1;min-height:0;}
  #map{width:100%;height:100%;}
  #locate-btn{position:absolute;right:14px;bottom:14px;width:46px;height:46px;border-radius:50%;background:#fff;border:none;box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;z-index:10;}
  #locate-btn.loading{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #radius-pill{position:absolute;left:14px;top:14px;background:#fff;border-radius:20px;box-shadow:var(--sh);display:flex;padding:3px;z-index:10;}
  .r-opt{padding:6px 12px;border-radius:16px;font-size:11.5px;font-weight:700;color:var(--tx2);cursor:pointer;}
  .r-opt.on{background:var(--navy);color:#fff;}
  #status-pill{position:absolute;left:50%;top:14px;transform:translateX(-50%);background:rgba(18,22,58,.88);color:#fff;font-size:11.5px;font-weight:600;padding:7px 14px;border-radius:20px;z-index:10;transition:.2s;pointer-events:none;}
  #status-pill.hidden{opacity:0;visibility:hidden;}

  /* custom marker */
  .pin{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid #fff;cursor:pointer;}
  .pin span{transform:rotate(45deg);font-size:15px;}
  .pin.me{background:var(--amber);border-radius:50%;transform:none;width:22px;height:22px;box-shadow:0 0 0 6px rgba(255,176,32,.25);}
  .pin.me span{display:none;}

  /* ---- Bottom sheet ---- */
  #sheet{position:absolute;left:0;right:0;bottom:0;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(18,22,58,.15);z-index:15;transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.3,1.1);max-height:62%;display:flex;flex-direction:column;}
  #sheet.open{transform:translateY(0);}
  .sheet-handle{width:36px;height:4px;background:var(--bd);border-radius:3px;margin:10px auto 4px;flex-shrink:0;}
  #sheet-body{overflow-y:auto;padding:6px 20px 22px;}
  .sheet-top{display:flex;align-items:flex-start;gap:12px;padding:10px 0 14px;}
  .sheet-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .sheet-name{font-size:17px;font-weight:800;margin:0 0 2px;letter-spacing:-.01em;}
  .sheet-addr{font-size:12.5px;color:var(--tx3);margin:0;}
  .sheet-dist{font-size:11.5px;font-weight:700;color:var(--amber-d);background:#fff6e5;padding:3px 8px;border-radius:8px;display:inline-block;margin-top:6px;}
  .tier-table{width:100%;border-collapse:collapse;margin-bottom:16px;}
  .tier-table td{padding:11px 12px;font-size:13.5px;border-bottom:1px solid var(--bg);}
  .tier-table td:first-child{font-weight:800;color:var(--tx2);width:34%;}
  .tier-table td:last-child{font-weight:800;color:var(--tx);text-align:right;}
  .sheet-note{font-size:12px;color:var(--tx3);background:var(--bg);padding:10px 12px;border-radius:10px;margin-bottom:16px;line-height:1.5;}
  .sheet-cta{display:block;width:100%;text-align:center;padding:15px;border-radius:13px;background:var(--navy);color:#fff;font-weight:800;font-size:14.5px;text-decoration:none;letter-spacing:-.01em;}
  .no-nearby{font-size:12.5px;color:var(--tx3);text-align:center;padding:8px 0 16px;}
  #sheet-close{position:absolute;right:14px;top:12px;width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;font-size:14px;color:var(--tx2);cursor:pointer;}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div class="row1">
      <h1><span class="dot"></span> 내 주변 T멤버십</h1>
      <span id="data-updated" style="font-size:10.5px;color:rgba(255,255,255,.4);font-weight:600;"></span>
    </div>
    <div class="search-wrap">
      <input id="search-input" placeholder="브랜드 검색 (예: 스타벅스, CGV)" autocomplete="off">
      <span class="search-icon">🔍</span>
      <div id="suggest" class="hidden"></div>
    </div>
  </div>

  <!-- Category chips -->
  <div id="chips"></div>

  <!-- Map -->
  <div id="map-wrap">
    <div id="map"></div>
    <div id="status-pill" class="hidden">위치 확인 중…</div>
    <div id="radius-pill"></div>
    <button id="locate-btn">📍</button>

    <div id="sheet">
      <button id="sheet-close">✕</button>
      <div class="sheet-handle"></div>
      <div id="sheet-body"></div>
    </div>
  </div>

</div>

<script>
/* ============ SKT T멤버십 상시혜택 DB ============ */
/* 데이터는 코드에 박아두지 않고 benefits.json에서 불러옵니다.
   혜택이 바뀌면 이 HTML을 건드릴 필요 없이 benefits.json만 고쳐서 커밋하면 됩니다. */
let BENEFITS = [];
let CATS = [];
let DATA_UPDATED_AT = '';
const catColor = id => (CATS.find(c=>c.id===id)||{}).color || '#5b5f82';
const catLabel = id => (CATS.find(c=>c.id===id)||{}).label || '';
const catIcon = id => (CATS.find(c=>c.id===id)||{}).icon || '📍';
const isOnlineCat = id => (CATS.find(c=>c.id===id)||{}).location_type === 'online';
const DEFAULT_CENTER = {lat:37.5665, lng:126.9780}; // 서울시청 fallback

async function loadBenefitsData(){
  const res = await fetch('./benefits.json', {cache:'no-store'});
  if(!res.ok) throw new Error('benefits.json 로드 실패');
  const data = await res.json();
  BENEFITS = data.benefits || [];
  CATS = data.categories || [];
  DATA_UPDATED_AT = data.updated_at || '';
}

/* ============ State ============ */
let map, kakaoPlaces, userLoc = null, radius = 2000;
let markers = []; // {overlay, benefit, place}
let activeCats = new Set(CATS.map(c=>c.id));

/* 카카오맵 JavaScript 키 (Kakao Developers > 앱 > 플랫폼 키 > JavaScript 키) */
const KAKAO_JS_KEY = 'a8fa826efdbe07a5692444a610414c10';

function loadKakaoSDK(key, onOk, onFail){
  if(window.kakao && window.kakao.maps){ onOk(); return; }
  const s = document.createElement('script');
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&autoload=false&libraries=services`;
  s.onerror = onFail;
  s.onload = ()=>{
    try{ kakao.maps.load(onOk); } catch(e){ onFail(); }
  };
  document.head.appendChild(s);
}

/* ============ App start ============ */
async function boot(){
  setStatus('혜택 데이터 불러오는 중…');
  try{
    await loadBenefitsData();
  }catch(e){
    setStatus(null);
    alert('benefits.json을 불러오지 못했어요. index.html과 같은 폴더에 benefits.json이 있는지 확인해주세요.');
    return;
  }
  setStatus('지도 불러오는 중…');
  const badge = document.getElementById('data-updated');
  if(badge && DATA_UPDATED_AT) badge.textContent = DATA_UPDATED_AT + ' 기준';
  loadKakaoSDK(KAKAO_JS_KEY, ()=>{
    renderChips();
    initMap(DEFAULT_CENTER);
    locateMe();
  }, ()=>{
    setStatus(null);
    alert('카카오맵을 불러오지 못했어요. 이 페이지의 도메인이 Kakao Developers 콘솔의 "플랫폼 > Web > 사이트 도메인"에 등록되어 있는지 확인해주세요.');
  });
}

function initMap(center){
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(center.lat, center.lng),
    level: 5
  });
  kakaoPlaces = new kakao.maps.services.Places();
}

/* ============ Location ============ */
const statusPill = document.getElementById('status-pill');
function setStatus(text){
  if(!text){ statusPill.classList.add('hidden'); return; }
  statusPill.textContent = text;
  statusPill.classList.remove('hidden');
}

document.getElementById('locate-btn').addEventListener('click', locateMe);

function locateMe(){
  const btn = document.getElementById('locate-btn');
  btn.classList.add('loading');
  setStatus('내 위치 확인 중…');
  if(!navigator.geolocation){
    userLoc = DEFAULT_CENTER;
    afterLocation('위치 접근이 지원되지 않아 서울시청 기준으로 표시해요');
    btn.classList.remove('loading');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      userLoc = {lat:pos.coords.latitude, lng:pos.coords.longitude};
      afterLocation(null);
      btn.classList.remove('loading');
    },
    err=>{
      userLoc = DEFAULT_CENTER;
      afterLocation('위치 접근이 거부되어 서울시청 기준으로 표시해요');
      btn.classList.remove('loading');
    },
    {enableHighAccuracy:true, timeout:8000}
  );
}

function afterLocation(warnMsg){
  const center = new kakao.maps.LatLng(userLoc.lat, userLoc.lng);
  map.setCenter(center);
  placeMeMarker();
  searchAllBenefits();
  if(warnMsg){ setStatus(warnMsg); setTimeout(()=>setStatus(null), 3200); }
  else setStatus(null);
}

let meOverlay = null;
function placeMeMarker(){
  if(meOverlay) meOverlay.setMap(null);
  const el = document.createElement('div');
  el.className = 'pin me';
  meOverlay = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(userLoc.lat, userLoc.lng),
    content: el, yAnchor: 0.5, zIndex: 20
  });
  meOverlay.setMap(map);
}

/* ============ Radius pill ============ */
const radiusPill = document.getElementById('radius-pill');
[[1000,'1km'],[2000,'2km'],[5000,'5km']].forEach(([m,label])=>{
  const d = document.createElement('div');
  d.className = 'r-opt' + (m===radius?' on':'');
  d.textContent = label;
  d.dataset.m = m;
  d.addEventListener('click', ()=>{
    radius = m;
    [...radiusPill.children].forEach(c=>c.classList.toggle('on', c===d));
    if(userLoc) searchAllBenefits();
  });
  radiusPill.appendChild(d);
});

/* ============ Chips (매장 있는 카테고리만) ============ */
function renderChips(){
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  const storeCats = CATS.filter(c => c.location_type === 'store');
  const allChip = document.createElement('div');
  allChip.className = 'chip on';
  allChip.textContent = '전체';
  allChip.addEventListener('click', ()=>{
    storeCats.forEach(c=>activeCats.add(c.id));
    renderChips();
    applyFilter();
  });
  wrap.appendChild(allChip);
  storeCats.forEach(c=>{
    const count = BENEFITS.filter(b=>b.cat===c.id).length;
    const chip = document.createElement('div');
    chip.className = 'chip' + (activeCats.has(c.id) ? ' on':'');
    chip.innerHTML = `${c.icon} ${c.label}<span class="n">${count}</span>`;
    chip.addEventListener('click', ()=>{
      if(activeCats.has(c.id)) activeCats.delete(c.id);
      else activeCats.add(c.id);
      allChip.classList.toggle('on', storeCats.every(c2=>activeCats.has(c2.id)));
      chip.classList.toggle('on');
      applyFilter();
    });
    wrap.appendChild(chip);
  });
}

function applyFilter(){
  markers.forEach(m=>{
    m.overlay.setMap(activeCats.has(m.benefit.cat) ? map : null);
  });
}

/* ============ Search nearby stores for all benefits ============ */
function clearMarkers(){
  markers.forEach(m=>m.overlay.setMap(null));
  markers = [];
}

function searchAllBenefits(){
  clearMarkers();
  const loc = new kakao.maps.LatLng(userLoc.lat, userLoc.lng);
  BENEFITS.filter(b => b.location_type !== 'online').forEach(benefit=>{
    kakaoPlaces.keywordSearch(benefit.keyword, (data, status)=>{
      if(status !== kakao.maps.services.Status.OK) return;
      // 가까운 최대 2곳만 표시 (지도 혼잡 방지)
      data.slice(0,2).forEach(place=>{
        addMarker(place, benefit);
      });
    }, {location: loc, radius: radius, sort: kakao.maps.services.SortBy.DISTANCE});
  });
}

function addMarker(place, benefit){
  const el = document.createElement('div');
  el.className = 'pin';
  el.style.background = catColor(benefit.cat);
  el.innerHTML = `<span>${catIcon(benefit.cat)}</span>`;
  const overlay = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(place.y, place.x),
    content: el, yAnchor: 1, zIndex: 10
  });
  if(activeCats.has(benefit.cat)) overlay.setMap(map);
  el.addEventListener('click', ()=> openSheet(benefit, place));
  markers.push({overlay, benefit, place});
}

/* ============ Search bar (brand lookup) ============ */
const searchInput = document.getElementById('search-input');
const suggestEl = document.getElementById('suggest');

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim();
  if(!q){ suggestEl.classList.add('hidden'); return; }
  const matches = BENEFITS.filter(b=> b.name.toLowerCase().includes(q.toLowerCase()) );
  if(matches.length===0){
    suggestEl.innerHTML = `<div class="sug-item" style="color:var(--tx3);cursor:default;">일치하는 T멤버십 상시혜택 브랜드가 없어요</div>`;
    suggestEl.classList.remove('hidden');
    return;
  }
  suggestEl.innerHTML = '';
  matches.slice(0, 30).forEach(b=>{
    const item = document.createElement('div');
    item.className = 'sug-item';
    const onlineTag = b.location_type === 'online' ? ' · 온라인 전용' : '';
    item.innerHTML = `<div class="sug-icon" style="background:${catColor(b.cat)}22;">${catIcon(b.cat)}</div>
      <div><div class="sug-name">${b.name}</div><div class="sug-cat">${catLabel(b.cat)}${onlineTag}</div></div>`;
    item.addEventListener('click', ()=> selectBrand(b));
    suggestEl.appendChild(item);
  });
  suggestEl.classList.remove('hidden');
});

function selectBrand(benefit){
  suggestEl.classList.add('hidden');
  searchInput.value = benefit.name;
  searchInput.blur();
  if(benefit.location_type === 'online' || !userLoc){ openSheet(benefit, null); return; }
  const loc = new kakao.maps.LatLng(userLoc.lat, userLoc.lng);
  kakaoPlaces.keywordSearch(benefit.keyword, (data, status)=>{
    if(status === kakao.maps.services.Status.OK && data.length>0){
      const nearest = data[0];
      map.setCenter(new kakao.maps.LatLng(nearest.y, nearest.x));
      map.setLevel(4);
      openSheet(benefit, nearest);
    } else {
      openSheet(benefit, null);
    }
  }, {location: loc, radius: 20000, sort: kakao.maps.services.SortBy.DISTANCE});
}

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.search-wrap')) suggestEl.classList.add('hidden');
});

/* ============ Bottom sheet ============ */
const sheet = document.getElementById('sheet');
const sheetBody = document.getElementById('sheet-body');
document.getElementById('sheet-close').addEventListener('click', ()=> sheet.classList.remove('open'));

function openSheet(benefit, place){
  const tiersHtml = benefit.tiers.map(([tier, val])=>
    `<tr><td>${tier}</td><td>${val}</td></tr>`
  ).join('');

  const isOnline = benefit.location_type === 'online';
  let distHtml = '';
  let addrHtml = '';
  if(place){
    addrHtml = `<p class="sheet-addr">${place.road_address_name || place.address_name || ''}</p>`;
    if(place.distance){
      const m = parseInt(place.distance,10);
      const label = m < 1000 ? `${m}m` : `${(m/1000).toFixed(1)}km`;
      distHtml = `<span class="sheet-dist">📍 현재 위치에서 ${label}</span>`;
    }
  }

  let noNearbyHtml = '';
  if(!place){
    noNearbyHtml = isOnline
      ? `<div class="no-nearby">🌐 온라인/앱 전용 혜택이에요 · 매장 위치가 없어요</div>`
      : `<div class="no-nearby">현재 반경 안에서 가까운 매장을 찾지 못했어요. 지도를 이동하거나 반경을 넓혀보세요.</div>`;
  }

  sheetBody.innerHTML = `
    <div class="sheet-top">
      <div class="sheet-icon" style="background:${catColor(benefit.cat)}22;">${catIcon(benefit.cat)}</div>
      <div>
        <p class="sheet-name">${benefit.name}${place ? '' : ' · ' + catLabel(benefit.cat)}</p>
        ${addrHtml}
        ${distHtml}
      </div>
    </div>
    <table class="tier-table">${tiersHtml}</table>
    ${benefit.note ? `<div class="sheet-note">${benefit.note}</div>` : ''}
    ${noNearbyHtml}
    <a class="sheet-cta" href="${benefit.link}" target="_blank" rel="noopener">T멤버십에서 혜택 사용하기 →</a>
  `;
  sheet.classList.add('open');
}

/* ============ Init ============ */
boot();
</script>
</body>
</html>
